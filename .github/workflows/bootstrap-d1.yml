name: bootstrap-d1

# One-time D1 setup. Manually triggered. Creates the socialisn2-inbox D1 if
# it doesn't already exist, applies the schema from 0001_inbox.sql, and
# prints the database id in the workflow summary so it can be pasted into
# both wrangler.toml files in a follow-up PR.
#
# Idempotent end-to-end:
#   - `wrangler d1 list` lookup returns the existing id if the database is
#     already there, otherwise creates it.
#   - migrations/0001_inbox.sql uses CREATE {TABLE,INDEX} IF NOT EXISTS for
#     every statement, so re-applying against an already-initialised
#     database is a no-op rather than a duplicate-table error.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: email-worker
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: email-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Find or create the D1 database
        id: d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          existing=$(npx wrangler d1 list --json 2>/dev/null | jq -r '.[] | select(.name == "socialisn2-inbox") | .uuid' || true)
          if [ -n "$existing" ]; then
            echo "Database socialisn2-inbox already exists: $existing"
            id="$existing"
            created=false
          else
            echo "Creating database socialisn2-inbox..."
            create_output=$(npx wrangler d1 create socialisn2-inbox 2>&1)
            echo "$create_output"
            id=$(echo "$create_output" | grep -oE 'database_id = "[^"]+"' | head -1 | sed -E 's/database_id = "([^"]+)"/\1/')
            if [ -z "$id" ]; then
              echo "::error::Could not parse database_id from wrangler output"
              exit 1
            fi
            created=true
          fi
          echo "database_id=$id" >> "$GITHUB_OUTPUT"
          echo "created=$created" >> "$GITHUB_OUTPUT"

      - name: Inject database_id into wrangler.toml for this run
        # `wrangler d1 execute --remote` reads the database_id from the
        # `[[d1_databases]]` block in wrangler.toml; passing the database by
        # name on the CLI doesn't override it. Patch the placeholder in-place
        # so the schema-apply step sees a valid UUID. This change is
        # ephemeral — it lives only on the runner's checked-out copy and
        # never gets committed back; the canonical id-into-wrangler.toml
        # change still happens via a follow-up PR.
        env:
          DB_ID: ${{ steps.d1.outputs.database_id }}
        run: |
          set -euo pipefail
          sed -i "s/REPLACE_WITH_D1_ID_FROM_WRANGLER_D1_CREATE/${DB_ID}/" wrangler.toml
          echo "Patched email-worker/wrangler.toml for this run:"
          grep -E '^(database_id|database_name)' wrangler.toml

      - name: Apply all migrations via the shared script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: .
        run: bash scripts/apply-d1-migrations.sh

      - name: Workflow summary
        env:
          DB_ID: ${{ steps.d1.outputs.database_id }}
          CREATED: ${{ steps.d1.outputs.created }}
        run: |
          {
            echo "## bootstrap-d1 complete"
            echo ""
            if [ "$CREATED" = "true" ]; then
              echo "**Created new database** \`socialisn2-inbox\`."
            else
              echo "Database \`socialisn2-inbox\` already existed; schema re-applied."
            fi
            echo ""
            echo "**\`database_id\`:** \`$DB_ID\`"
            echo ""
            echo "### Next step"
            echo ""
            echo "Open a PR that replaces the \`REPLACE_WITH_D1_ID_FROM_WRANGLER_D1_CREATE\` placeholder in **both** wrangler.toml files:"
            echo ""
            echo "- \`email-worker/wrangler.toml\`"
            echo "- \`feed-worker/wrangler.toml\`"
            echo ""
            echo "On merge, the \`deploy-workers\` workflow auto-deploys both Workers."
          } >> "$GITHUB_STEP_SUMMARY"
