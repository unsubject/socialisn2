name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: socialisn2
          POSTGRES_PASSWORD: socialisn2
          POSTGRES_DB: socialisn2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U socialisn2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://socialisn2:socialisn2@localhost:5432/socialisn2_test
      REDIS_URL: redis://localhost:6379
      TZ: America/New_York

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate docker-compose.yml
        # Structural lint of the compose file: expands ${VAR}
        # substitutions and validates label / network / service
        # references. The `external: true` on n8n-traefik-1 means
        # compose config does NOT try to reach the docker daemon to
        # verify the network exists — purely YAML-level.
        #
        # The service-level `env_file: .env` in compose is validated
        # for existence separately from the --env-file CLI flag.
        # Staging .env from .env.example satisfies the existence
        # check; it ALSO supplies the ${VAR} substitutions, so the
        # --env-file flag is unnecessary here.
        run: |
          cp .env.example .env
          docker compose config --quiet
          rm .env

  email-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: email-worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: email-worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  feed-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feed-worker
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: feed-worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
