name: Claude PR Review

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are reviewing a pull request on `unsubject/socialisn2`, an
            editorial-intelligence agent. Stack: Node 20 / TypeScript,
            drizzle-orm against Postgres, BullMQ + Redis, two Cloudflare
            Workers (`email-worker/`, `feed-worker/`) sharing one D1.

            Read `BUILD-PHASES.md`, `SPEC.md`, and any `docs/adr/*.md` that
            the diff touches before commenting. Match feedback to the phase
            the PR claims to land in.

            Repo conventions (treat violations as review blockers):
            - Every PR branches from `main`. No stacking.
            - Integration tests use a real Postgres service container in CI.
              No DB mocks. Flag any newly introduced DB mock.
            - ADRs live at `docs/adr/NNN-slug.md`, written in the PR that
              introduces the decision. Flag decisions that should be an ADR
              but aren't.
            - Phase-ending PRs include a phase report under
              `docs/phase-reports/`.
            - Handoff notes (`docs/handoffs/YYYY-MM-DD*.md`) are end-of-
              session, not per-PR — don't request them.

            Known gotchas in this codebase — flag if reintroduced:
            - drizzle-pg: passing a JS `Date` through raw `sql\`${date}\``
              fails ("malformed array literal" or bind error). Use typed
              `gte`/`lte`/`eq` with the column directly.
            - drizzle-pg: `${arr}::enum[]` in raw `sql` fails. Expand with
              `sql.join`.
            - `db.execute<T>()` does not run pg type parsers — `timestamptz`
              comes back as a string. Wrap with `new Date(...)`.
            - `db.execute<T>()` rejects `interface` for `T`; use a `type`
              alias or inline record literal.
            - Schema changes need a numbered migration in `migrations/`;
              drift between `src/db/schema.ts` and migrations is a bug.
            - Cost-bearing LLM calls must record to `cost_ledger`.

            What to write:
            1. **Verdict** — one of: ship-it / minor-nits / requires-changes /
               blocks-on-discussion. One sentence reason.
            2. **Must-fix** — correctness, security, schema/migration drift,
               cost-tracking gaps, or known-gotcha regressions. Cite
               `path:line`.
            3. **Should-consider** — design, test coverage, naming,
               consistency with existing modules. Cite `path:line`.
            4. **Questions** — anything ambiguous about intent or scope.
            5. **Out of scope but noticed** — defer to a Build-list item;
               don't ask the author to expand the PR.

            Be terse. No restating the diff. No emojis. No closing summary.
            If the PR is a phase report, focus on whether the report
            matches what actually shipped — not on re-reviewing the merged
            code.
          claude_args: |
            --max-turns 20
