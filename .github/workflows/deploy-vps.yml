name: deploy-vps

# Manual companion to deploy-workers.yml. Workers (email-worker +
# feed-worker) are auto-deployed by deploy-workers.yml on push to main;
# the VPS side (app + ingestion/scoring/whisper workers + postgres +
# redis + litellm + nginx) deploys here via a self-hosted runner on
# srv1565522 — see docs/deploy.md § Self-hosted runner setup.
#
# Trigger: workflow_dispatch only. Auto-deploy on push to main can be
# added later (paths filter on src/** + docker-compose.yml). The first
# v1 invocation is deliberately operator-driven — matches Phase 5 PR 4
# (5-day pilot) boundary in BUILD-PHASES.
#
# Why self-hosted instead of ubuntu-latest + SSH:
#   - Hostinger firewall ("Gandalf") restricts port 22 to a single
#     source IP; rotating GH runner IPs would need a permanent broad
#     allowlist or a dynamic firewall rule per deploy.
#   - Self-hosted runner polls outbound — no inbound exposure, no
#     SSH key to leak from secrets, no firewall surface.
#   - Workflow runs `docker compose ...` directly on the VPS without
#     SSH heredocs; net ~65 lines simpler than the SSH version.

on:
  workflow_dispatch:

concurrency:
  # Two deploys to the same VPS racing on docker compose / migrations
  # would be worse than queueing them. cancel-in-progress: false so a
  # partial deploy isn't abandoned half-way.
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    # The runner is installed at /home/deploy/actions-runner on
    # srv1565522 as a systemd service (`actions.runner.unsubject-...`),
    # configured with labels `self-hosted,linux,x64`. Default GH labels.
    runs-on: self-hosted
    steps:
      - name: Bootstrap repo (clone if first deploy)
        # First-deploy bootstrap: clone /opt/socialisn2 if missing.
        # On the runner host /opt/socialisn2 should already exist
        # because the operator pre-chowned it to `deploy` (see
        # docs/deploy.md), but this step also handles a wipe-and-
        # redeploy or a fresh VPS rebuild.
        run: |
          set -euo pipefail
          if [ ! -d /opt/socialisn2/.git ]; then
            echo "[bootstrap] /opt/socialisn2 not a git repo — cloning"
            git clone --quiet https://github.com/unsubject/socialisn2.git /opt/socialisn2
          else
            echo "[bootstrap] /opt/socialisn2 already cloned"
          fi

      - name: Sanity-check VPS prereqs
        # Three fail-fast checks for the operator-side prereqs that
        # docker compose / migrate can't surface clearly on its own:
        #   - Traefik container must be running (it routes mcp.socialisn.com)
        #   - /opt/socialisn2/.env must exist (env_file: .env)
        #   - .env must be readable by the runner user (deploy)
        run: |
          set -euo pipefail
          if ! docker inspect traefik-yffq-traefik-1 >/dev/null 2>&1; then
            echo "::error::Container 'traefik-yffq-traefik-1' not found on the VPS. Without it the Traefik labels on app/nginx are inert and mcp.socialisn.com 404s. See docs/deploy.md § Traefik prereq."
            exit 1
          fi
          if [ ! -f /opt/socialisn2/.env ]; then
            echo "::error::/opt/socialisn2/.env not found. The deploy needs PUBLIC_HOST, DATABASE_URL, POSTGRES_PASSWORD, the LLM keys, and TWO_BRAIN_MCP_URL/TOKEN at minimum. See docs/deploy.md § Required .env keys."
            exit 1
          fi
          if [ ! -r /opt/socialisn2/.env ]; then
            echo "::error::/opt/socialisn2/.env exists but is not readable by $(whoami). Check ownership/permissions."
            exit 1
          fi
          echo "[prereqs] traefik container present; .env present + readable"

      - name: Fast-forward repo to origin/main
        run: |
          set -euo pipefail
          cd /opt/socialisn2
          git fetch --quiet origin main
          git reset --hard origin/main
          # Surface the new HEAD into the workflow log so an operator
          # reading "deploy-vps run #N" can correlate to a specific
          # commit without opening the GH UI for the runner.
          git --no-pager log -1 --oneline

      - name: Build all service images
        # `app` + `ingestion-worker` + `scoring-worker` + `whisper-worker`
        # all have `build: .` in docker-compose.yml — each gets its own
        # image tag (socialisn2-app, socialisn2-ingestion-worker, etc.)
        # because compose builds per-service when no `image:` is set.
        #
        # `docker compose build` (no service arg) rebuilds ALL services
        # with a `build:` directive. Layer cache shares the deps +
        # npm-ci layers across them, so the cost is one extra build per
        # worker (~5-15s each, cache warm). Required because targeting
        # only `app` leaves the worker images on whatever bytes were
        # last built (possibly months old on workers-only code changes)
        # — see the regression PR #84 was supposed to fix but didn't,
        # because the worker image wasn't rebuilt with the new src.
        run: |
          set -euo pipefail
          cd /opt/socialisn2
          docker compose build

      - name: Bring up dependencies + preflight + apply Postgres migrations
        # Migrations run BEFORE the app/workers come up so a deploy that
        # depends on a new column can't crash-loop the runtime container
        # waiting for a schema that the migrate step hasn't applied yet.
        # postgres / redis / litellm come up first because the one-shot
        # `app` container needs DATABASE_URL reachable. `--wait` blocks
        # until each service's healthcheck reports healthy (depends_on
        # condition `service_healthy`); without it, `up -d` returns the
        # moment the container starts, and the subsequent --no-deps
        # migrate could fire before Postgres accepts connections.
        #
        # Preflight (Obs-4) runs between `up -d --wait` and `migrate`:
        # it validates DATABASE_URL reachability + the LiteLLM/OpenAI/
        # cost env surface inside the freshly-started `app` container.
        # On failure it exits 1 with a `::error::` annotation, blocking
        # the migrate step. The redacted-connect wrapper guarantees a
        # parse error here cannot leak the connection string — the
        # 2026-05-19 incident class is structurally blocked.
        run: |
          set -euo pipefail
          cd /opt/socialisn2
          docker compose up -d --wait postgres redis litellm
          # --no-deps bypasses depends_on for the one-shot container so
          # we don't accidentally tear down healthy postgres/redis on
          # `--rm`. Postgres is already up-and-healthy from the
          # previous step.
          docker compose run --rm --no-deps app node dist/scripts/preflight.js
          docker compose run --rm --no-deps app node dist/scripts/migrate.js

      - name: Bring up app + workers + nginx
        # `up -d` is idempotent — services whose image SHA or config
        # changed get recreated. After the build-all step above, the
        # worker images carry the new SHA when src/workers/* or
        # src/queue/* changed, so the workers recreate cleanly with
        # the new bytes.
        run: |
          set -euo pipefail
          cd /opt/socialisn2
          docker compose up -d
          docker compose ps

      - name: Post-deploy backfill + brain_corpus_status assertion
        # Final gate. Runs inside a one-shot `app` container so the env
        # is exactly what the freshly-started app/workers see. Non-zero
        # exit here fails the workflow visibly per PR #64 review P2 #3
        # (silent 'not_configured' is a worse failure mode than a red
        # deploy).
        run: |
          set -euo pipefail
          cd /opt/socialisn2
          docker compose run --rm --no-deps app node dist/scripts/post-deploy-backfill.js

      - name: Step summary
        if: always()
        run: |
          {
            echo "## deploy-vps"
            echo ""
            echo "Triggered by: ${{ github.actor }}"
            echo "Result: ${{ job.status }}"
            echo ""
            echo "Cloudflare Workers (email-worker, feed-worker) deploy via the"
            echo "separate deploy-workers workflow on push to main — re-run that"
            echo "workflow_dispatch if a Worker-only redeploy is needed."
          } >> "$GITHUB_STEP_SUMMARY"
