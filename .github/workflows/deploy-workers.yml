name: deploy-workers

# Auto-deploys both Cloudflare Workers (email-worker + feed-worker) on push
# to main, gated by path filter. Also exposes workflow_dispatch for manual
# redeploy without a code change.
#
# apply-migrations runs FIRST as a shared prerequisite so a code change
# that depends on a new column (e.g. unmatched.raw_headers added by
# 0003_unmatched_raw_headers.sql) can't get deployed before the schema
# is current. Both deploys run in parallel after migrations succeed.
#
# Each deploy job also fails fast if its wrangler.toml still has the
# bootstrap placeholder, so a stray `git revert` of the id-patch PR
# can't accidentally redeploy a Worker pointed at no database.

on:
  push:
    branches: [main]
    paths:
      - 'email-worker/**'
      - 'feed-worker/**'
      - '.github/workflows/deploy-workers.yml'
      - 'scripts/apply-d1-migrations.sh'
  workflow_dispatch:

concurrency:
  # Serialise deploys of the same branch to avoid two CI runs racing on
  # `wrangler deploy`. Don't cancel in-progress — partial deploys are worse
  # than queued ones.
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: email-worker/package-lock.json

      - name: Install email-worker dependencies (for wrangler)
        working-directory: email-worker
        run: npm ci

      - name: Refuse to migrate against a placeholder D1 binding
        run: |
          if grep -q 'REPLACE_WITH_D1_ID_FROM_WRANGLER_D1_CREATE' email-worker/wrangler.toml; then
            echo "::error::email-worker/wrangler.toml still has the placeholder database_id. Run the bootstrap-d1 workflow first."
            exit 1
          fi

      - name: Apply pending D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/apply-d1-migrations.sh

  deploy-email-worker:
    runs-on: ubuntu-latest
    needs: apply-migrations
    defaults:
      run:
        working-directory: email-worker
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: email-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Refuse to deploy with placeholder D1 binding
        run: |
          if grep -q 'REPLACE_WITH_D1_ID_FROM_WRANGLER_D1_CREATE' wrangler.toml; then
            echo "::error::email-worker/wrangler.toml still has the placeholder database_id. Run the bootstrap-d1 workflow first, then merge a PR that pastes the returned id into wrangler.toml."
            exit 1
          fi

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: email-worker
          command: deploy

  deploy-feed-worker:
    runs-on: ubuntu-latest
    needs: apply-migrations
    defaults:
      run:
        working-directory: feed-worker
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: feed-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Refuse to deploy with placeholder D1 binding
        run: |
          if grep -q 'REPLACE_WITH_D1_ID_FROM_WRANGLER_D1_CREATE' wrangler.toml; then
            echo "::error::feed-worker/wrangler.toml still has the placeholder database_id. Run the bootstrap-d1 workflow first, then merge a PR that pastes the returned id into wrangler.toml."
            exit 1
          fi

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: feed-worker
          command: deploy
