# LiteLLM proxy config — routes the model_name used by src/lib/llm.ts
# (and src/cost/pricing.ts) to the underlying provider.
#
# Added in the Phase 2 LiteLLM-in-docker-compose follow-up. Replaces
# the ADR-002 / SPEC §4.2 assumption of a pre-existing operator-managed
# LiteLLM proxy.

model_list:
  # Normalise stage (SPEC §7.3) + Stage 4 cluster summarisation —
  # Gemini 2.5 Flash-Lite.
  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GOOGLE_AI_API_KEY

  # Curate stage (SPEC §9.4) — Gemini 3.1 Flash-Lite. Curate default
  # since 2026-05-31. src/scoring/curate.ts pins reasoning_effort=minimal
  # (→ Gemini thinking_level=minimal) so the model can't truncate its
  # JSON by spending the output budget on hidden reasoning — the failure
  # mode that took down gemini-3.5-flash. $0.25/$1.50 per 1M.
  - model_name: gemini-3.1-flash-lite
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GOOGLE_AI_API_KEY

  # Gemini 3.5 Flash — was the curate default 2026-05-28 → 2026-05-31.
  # Kept routed as a fallback target / for ad-hoc A/B. $1.50/$9.00 per 1M.
  - model_name: gemini-3.5-flash
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GOOGLE_AI_API_KEY

  # Sonnet 4.5 — kept routed as a fallback / for ad-hoc A/B comparisons
  # against the current curate model. Was the curate default before
  # 2026-05-28.
  - model_name: claude-sonnet-4.5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # Haiku 4.5 — reserved for cheaper agent paths.
  - model_name: claude-haiku-4.5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # Drop provider-specific params LiteLLM doesn't recognise instead of
  # throwing — keeps src/lib/llm.ts provider-agnostic.
  drop_params: true

  # Per-model fallback chain. LiteLLM engages this on 5xx /
  # RateLimitError / Timeout / APIError-family failures. It DOES NOT
  # engage on BadRequestError (4xx), including:
  #   - provider-side content-policy 400 (e.g. Gemini safety filter
  #     refusing the prompt)
  #   - provider-side "model deprecated" 400
  #   - the missing-route 400 emitted by THIS proxy when the requested
  #     model_name isn't in `model_list` above (a class the
  #     always-recycle-litellm step in deploy-vps.yml + the smoke
  #     probe in scripts/preflight.ts is what catches)
  # See https://github.com/BerriAI/litellm/issues/12503 for the
  # currently-open behavior gap on 4xx pass-through.
  #
  # Practical effect: 5xx outages and rate limits degrade gracefully;
  # 4xx-class refusals propagate unmasked to the caller (where
  # src/scoring/curate.ts already has skip-on-error wrapping for the
  # parse-error class, and src/orchestrator/run.ts halts on
  # CostCeilingHitError).
  #
  # Curate (Gemini 3.1 Flash-Lite) falls back to the 2.5 Flash-Lite then
  # to Claude Haiku — even a full Google outage degrades to
  # Haiku-at-Anthropic rather than zero candidates. Pricing in
  # src/cost/pricing.ts has entries for all of them; cost_ledger
  # records the model that actually served, so post-hoc accounting
  # surfaces the fall-through.
  fallbacks:
    - { "gemini-3.1-flash-lite": ["gemini-2.5-flash-lite", "claude-haiku-4.5"] }
    - { "gemini-3.5-flash": ["gemini-2.5-flash-lite", "claude-haiku-4.5"] }
    - { "gemini-2.5-flash-lite": ["claude-haiku-4.5"] }
    # Weekly brief (redesign P1): the one deliberately-frontier call in
    # the system. On a Sonnet outage, degrade to Gemini 3.5 Flash —
    # a weaker brief beats a missing Sunday brief.
    - { "claude-sonnet-4.5": ["gemini-3.5-flash"] }

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
