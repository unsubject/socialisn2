# LiteLLM proxy config — routes the model_name used by src/lib/llm.ts
# (and src/cost/pricing.ts) to the underlying provider.
#
# Added in the Phase 2 LiteLLM-in-docker-compose follow-up. Replaces
# the ADR-002 / SPEC §4.2 assumption of a pre-existing operator-managed
# LiteLLM proxy.

model_list:
  # Normalise stage (SPEC §7.3) + Stage 4 cluster summarisation —
  # Gemini 2.5 Flash-Lite.
  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GOOGLE_AI_API_KEY

  # Curate stage (SPEC §9.4) — Gemini 3.5 Flash. Replaced
  # claude-sonnet-4.5 on 2026-05-28 to halve curate spend
  # ($1.50/$9.00 per 1M vs $3/$15) and unblock the $1.50/day
  # cost ceiling under current queue volume.
  - model_name: gemini-3.5-flash
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GOOGLE_AI_API_KEY

  # Sonnet 4.5 — kept routed as a fallback / for ad-hoc A/B comparisons
  # against the current curate model. Was the curate default before
  # 2026-05-28.
  - model_name: claude-sonnet-4.5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # Haiku 4.5 — reserved for cheaper agent paths.
  - model_name: claude-haiku-4.5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # Drop provider-specific params LiteLLM doesn't recognise instead of
  # throwing — keeps src/lib/llm.ts provider-agnostic.
  drop_params: true

  # Per-model fallback chain. When the named model returns a 5xx /
  # rate-limit / timeout, LiteLLM tries the next entry in the list
  # before surfacing failure to the caller. Added 2026-05-30 to
  # contain Gemini outages — pre-fix, a Google 5xx burst translated
  # 1:1 to scoring-run failures.
  #
  # NOT a substitute for routing fidelity: if the requested model
  # name itself isn't in `model_list` above, the proxy returns 400
  # at the routing layer BEFORE these fallbacks engage. The
  # always-recycle-litellm step in deploy-vps.yml + the smoke probe
  # in scripts/preflight.ts is what catches that class.
  #
  # Curate (Gemini 3.5 Flash) falls back to a cheaper Gemini, then
  # to Claude Haiku — even a full Google outage degrades to
  # Haiku-at-Anthropic rather than zero candidates. Pricing in
  # src/cost/pricing.ts has entries for all three; cost_ledger
  # records the model that actually served, so post-hoc accounting
  # surfaces the fall-through.
  fallbacks:
    - { "gemini-3.5-flash": ["gemini-2.5-flash-lite", "claude-haiku-4.5"] }
    - { "gemini-2.5-flash-lite": ["claude-haiku-4.5"] }

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
