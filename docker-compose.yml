# Local + VPS dev compose.
#
# The Cloudflare Workers behind SPEC §6.9 — email-worker/ and feed-worker/ —
# deploy independently via `wrangler deploy` against a shared D1 database and
# are NOT in this file. VPS reboots must not affect inbound newsletter intake.
#
# VPS layout (Phase 5 PR 2): app + nginx are labeled for Traefik discovery.
# The shared Traefik instance on srv1565522 runs in `network_mode: host`
# (separate compose project `traefik-yffq`), so there is NO external network
# to join — Traefik discovers containers via the Docker socket and routes
# via the container's bridge IP from the host's network namespace. The cert
# resolver is named `letsencrypt`. Path-prefix split via Traefik priority
# labels: /feeds → nginx (priority 10), everything else → app (priority 1).
# Local dev runs the same compose; without Traefik in front, nothing reaches
# mcp.socialisn.com but app + nginx still listen on their internal ports.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: socialisn2
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: socialisn2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialisn2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    # LiteLLM proxy — routes src/lib/llm.ts calls to the underlying
    # provider per config/litellm.yaml. Ran a sibling instance on the
    # VPS before this stack existed; bringing it into docker-compose
    # so local dev + future VPS deploy share the same routing config.
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:?set LITELLM_API_KEY in .env}
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:4000/health/liveliness\", timeout=2).status==200 else sys.exit(1)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    command: ["node", "dist/index.js"]
    # No host port mapping — Traefik (host network mode) reaches the
    # container at its bridge IP on the project's default network.
    volumes:
      # App writes RSS feeds here via env.rssPath(); nginx reads
      # from the same volume to serve them under /feeds.
      - feeds_data:/var/www/socialisn2/feeds
    healthcheck:
      # Uses node's global fetch — the slim image has neither curl nor
      # wget, and adding either bloats the image for one diagnostic
      # tool. start_period=20s covers Fastify boot + DB connection.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      # Catch-all on mcp.socialisn.com → app, lower priority than the
      # nginx PathPrefix(/feeds) router below. Handles /healthz,
      # /c/:id, /mcp (when SOCIALISN2_MCP_TOKEN is set).
      - "traefik.http.routers.socialisn2-app.rule=Host(`mcp.socialisn.com`)"
      - "traefik.http.routers.socialisn2-app.entrypoints=websecure"
      - "traefik.http.routers.socialisn2-app.tls=true"
      - "traefik.http.routers.socialisn2-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.socialisn2-app.priority=1"
      - "traefik.http.services.socialisn2-app.loadbalancer.server.port=3000"
      # Traefik-level health probe. Without this, Traefik routes the
      # instant the container is `running`, before Fastify is
      # listening — every deploy opens a brief 502 window. With it,
      # Traefik returns 503 from the router until /healthz passes,
      # which is the friendlier failure signal for CF / clients.
      - "traefik.http.services.socialisn2-app.loadbalancer.healthcheck.path=/healthz"
      - "traefik.http.services.socialisn2-app.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.socialisn2-app.loadbalancer.healthcheck.timeout=5s"

  nginx:
    # Static RSS server. Mounts the same feeds_data volume that the app
    # writes to; serves it under /feeds/<slug>.xml. Custom config
    # bind-mounted from infra/nginx/ rather than a custom image.
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/socialisn2.conf:/etc/nginx/conf.d/default.conf:ro
      - feeds_data:/var/www/socialisn2/feeds:ro
    labels:
      - "traefik.enable=true"
      # PathPrefix(`/feeds`) wins over the app's Host-only catch-all
      # thanks to priority=10 vs priority=1. Anything under /feeds/
      # routes here; everything else falls through to app.
      - "traefik.http.routers.socialisn2-feeds.rule=Host(`mcp.socialisn.com`) && PathPrefix(`/feeds`)"
      - "traefik.http.routers.socialisn2-feeds.entrypoints=websecure"
      - "traefik.http.routers.socialisn2-feeds.tls=true"
      - "traefik.http.routers.socialisn2-feeds.tls.certresolver=letsencrypt"
      - "traefik.http.routers.socialisn2-feeds.priority=10"
      - "traefik.http.services.socialisn2-feeds.loadbalancer.server.port=80"
      # nginx healthcheck — Traefik probes the internal endpoint that
      # the static-RSS config exposes for ops triage. Cheap to add
      # given the path block is already in the conf file.
      - "traefik.http.services.socialisn2-feeds.loadbalancer.healthcheck.path=/nginx-healthz"
      - "traefik.http.services.socialisn2-feeds.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.socialisn2-feeds.loadbalancer.healthcheck.timeout=5s"

  ingestion-worker:
    build: .
    restart: unless-stopped
    # Intentionally does NOT depend on litellm: ingestion only writes raw_items
    # and never calls llmCall, so a LiteLLM image-pull / config / port-4000
    # problem must not gate RSS / YouTube / email-bridge intake.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    command: ["node", "dist/workers/ingestion.js"]

  scoring-worker:
    build: .
    restart: unless-stopped
    # DOES depend on litellm — every tick runs normalise (Gemini Flash-Lite
    # via the proxy). A LiteLLM outage means no Phase 2 progress; that's
    # the correct failure mode here (cost-bearing path).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    env_file: .env
    command: ["node", "dist/workers/scoring.js"]
    volumes:
      # Scoring run's tail hook regenerates RSS feeds (orchestrator/run.ts
      # → defaultRegenerateFeeds → generateAllFeeds). Same mount as app
      # so either container can be the writer.
      - feeds_data:/var/www/socialisn2/feeds

  whisper-worker:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    # Phase 2 PR 1 (ADR-006 — Whisper model size for Cantonese) replaces this stub.
    command: ["node", "-e", "console.log('whisper-worker placeholder'); setInterval(()=>{}, 1<<30)"]

volumes:
  postgres_data:
  redis_data:
  # RSS feeds written by app/scoring-worker, read by nginx.
  feeds_data:
