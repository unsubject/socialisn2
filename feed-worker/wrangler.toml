name = "socialisn2-feed-worker"
main = "src/index.ts"
compatibility_date = "2024-09-25"

# Serves per-source Atom feeds at https://inbox.socialisn.com/feeds/<slug>.xml.
# Read-only over the shared `socialisn2-inbox` D1 database (writer is the
# sibling email-worker).
#
# Workers Custom Domain (custom_domain = true) rather than pattern-based
# route: Custom Domains auto-create the DNS record + SSL cert at deploy
# time; pattern routes require pre-existing DNS. Implication is that the
# Worker is invoked for ALL requests to inbox.socialisn.com, not just
# /feeds/*. The Worker already filters internally (SLUG_PATTERN in
# feed-handler.ts) and returns 404 for everything else, so binding the
# whole hostname is fine.
routes = [
  { pattern = "inbox.socialisn.com", custom_domain = true },
]

[[d1_databases]]
binding = "INBOX_DB"
database_name = "socialisn2-inbox"
database_id = "ab7605c4-be15-4499-ac42-e1d8202f9b51"
