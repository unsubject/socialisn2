# socialisn2 static RSS server. Mounted into nginx:alpine by
# docker-compose.yml. Reads RSS files atomically rotated into
# /var/www/socialisn2/feeds by src/rss/generate.ts (via the app or
# scoring-worker container; same Docker volume).
#
# Traefik routes PathPrefix(`/feeds`) here; everything else under
# mcp.socialisn.com falls through to the Fastify app.

server {
    listen 80 default_server;
    server_name _;

    # Internal liveness — Traefik doesn't route here from the outside,
    # but useful for `docker exec nginx curl localhost/nginx-healthz`
    # during VPS triage.
    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /feeds/ {
        alias /var/www/socialisn2/feeds/;
        # generateAllFeeds writes RSS 2.0; override the default
        # `text/xml` MIME with the conventional RSS one. The map is
        # nginx's `types` block scoped to this location so we don't
        # touch the global mime.types.
        types {
            application/rss+xml xml;
        }
        # Don't serve dotfiles or anything that isn't an existing
        # file — generateAllFeeds writes the canonical 6 (all.xml +
        # one per domain) and nothing else under this prefix.
        try_files $uri =404;
        # Cache-Control: feed readers poll on their own schedule;
        # serving a 60s cache header is enough to keep CDN load
        # benign while not pinning stale content.
        add_header Cache-Control "public, max-age=60";
    }
}
