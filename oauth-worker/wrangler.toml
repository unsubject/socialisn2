name = "socialisn2-oauth"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "2f58eaae9db581b9856eaa50937f0098"

# OAuth 2.1 gateway in front of the socialisn2 MCP. Implements the MCP
# Authorization spec (Dynamic Client Registration + PKCE S256 + RFC 9728
# protected-resource-metadata) via @cloudflare/workers-oauth-provider@0.7.0,
# gates consent behind a single GitHub user, and proxies authenticated
# /mcp requests to the VPS MCP with the static bearer injected server-side.
#
# TOPOLOGY (own-subdomain): this Worker answers on mcp-oauth.socialisn.com and
# proxies to the UNCHANGED VPS MCP at MCP_ORIGIN (mcp.socialisn.com). The VPS
# host keeps serving /mcp (bearer, for Claude Code/Desktop), /status, /c/:id
# and /feeds untouched. claude.ai web connects to https://mcp-oauth.socialisn.com/mcp.
#
# Deploy is manual via .github/workflows/deploy-oauth-worker.yml (workflow_dispatch);
# NOT wired into deploy-workers.yml.
#
# CUSTOM DOMAIN is bound out-of-band via the CF dashboard
# (Workers & Pages → socialisn2-oauth → Settings → Domains & Routes → Add →
# mcp-oauth.socialisn.com), NOT here: the deploy token lacks zone
# Workers-Routes:Edit, and a dashboard-added custom domain persists across
# `wrangler deploy` runs (wrangler only manages routes declared in config).

# --- KV: OAuthProvider storage (grants, tokens, clients, auth-flow state) --
[[kv_namespaces]]
binding = "OAUTH_KV"
# Provisioned 2026-05-25 via Cloudflare MCP (account Simon Lee 2f58eaae…).
id = "81ec45bbe8204542872af1e1c74007b1"

# --- Non-secret vars ------------------------------------------------------
[vars]
# The unchanged VPS MCP host that this gateway proxies authenticated /mcp to.
MCP_ORIGIN = "https://mcp.socialisn.com"
# Fallback login gate; the preferred check is the ALLOWED_GITHUB_ID secret
# (numeric, immutable). Simon's GitHub login.
ALLOWED_GITHUB_LOGIN = "unsubject"

# --- Secrets (set via deploy-oauth-worker.yml from GH repo secrets) -------
#   SOCIALISN2_MCP_TOKEN   static bearer for the upstream VPS MCP (server-side only)
#   GITHUB_CLIENT_ID       GitHub OAuth app client id
#   GITHUB_CLIENT_SECRET   GitHub OAuth app client secret
#   COOKIE_ENCRYPTION_KEY  HMAC key signing the OAuth-state cookie (CSRF binding)
#   ALLOWED_GITHUB_ID      numeric GitHub user id (174284337); precedence over login
